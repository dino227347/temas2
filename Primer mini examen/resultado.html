<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado del examen</title>
    <link rel="stylesheet" href="resultado.css">
</head>

<body>
    <div class="contenedor">
        <h1>📊 Resultado del examen</h1>

        <div class="tarjeta">
            <h2 id="puntaje">0 / 60</h2>
            <p>Porcentaje: <b id="porcentaje">0%</b></p>

            <div class="estadisticas">
                <div>
                    Correctas
                    <strong id="correctas" style="color: #22c55e;">0</strong>
                </div>
                <div>
                    Incorrectas
                    <strong id="incorrectas" style="color: #ef4444;">0</strong>
                </div>
                <div>
                    Sin responder
                    <strong id="sinResponder" style="color: #f59e0b;">0</strong>
                </div>
            </div>
            <p>Esto es nuevo es para caundo quieras ver en que pregunta fallaste pero solo se desbloquea despues de realizar el examen 10 veses </p>

            <!-- Mensaje de estado -->
            <div id="mensajeEstado" class="mensaje-estado"></div>
        </div>

        <!-- Botones -->
        <div class="botones">
            <button onclick="verAnalisis()" class="btn-analisis">
                📋 Que hicimos mal :(
            </button>
            <button onclick="volverInicio()" class="btn-inicio">
                🏠 Volver al inicio
            </button>
        </div>
    </div>

    <script src="preguntas.js"></script>
    <script src="resultado.js"></script>
</body>
</html>
